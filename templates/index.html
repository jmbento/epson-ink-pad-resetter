<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖨️ Epson Ink Pad Resetter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-check {
            background: #667eea;
            color: white;
        }

        .btn-check:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-reset {
            background: #ff6b6b;
            color: white;
        }

        .btn-reset:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
        }

        .btn-reset:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .status-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }

        .status-card.show {
            display: block;
        }

        .counter {
            margin-bottom: 15px;
        }

        .counter-name {
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .counter-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .counter-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
        }

        .counter-fill.critical {
            background: #ff6b6b;
        }

        .counter-percentage {
            font-size: 12px;
            color: #666;
            margin-top: 3px;
        }

        .message {
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #667eea;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #999;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖨️ Epson Ink Reset</h1>
            <p>Resete sua almofada em segundos</p>
        </div>

        <div id="message" class="message"></div>
        <div id="loading" class="loading">
            <div class="spinner"></div>Processando...
        </div>

        <div class="form-group">
            <label for="printerIp">IP da Impressora</label>
            <input 
                type="text" 
                id="printerIp" 
                placeholder="Ex: 192.168.1.100"
                value="192.168.1.100"
            >
            <small style="color: #999; margin-top: 5px; display: block;">
                Menu impressora → Rede → WiFi → Status
            </small>
        </div>

        <div class="button-group">
            <button class="btn-check" onclick="checkStatus()">✓ Verificar Status</button>
            <button class="btn-reset" id="btnReset" onclick="resetPrinter()" disabled>⚡ Resetar</button>
        </div>

        <div id="statusCard" class="status-card">
            <div id="countersContainer"></div>
        </div>

        <div class="footer">
            <p>🔗 <a href="https://github.com/jmbento/epson-ink-pad-resetter" target="_blank">GitHub</a> | 100% grátis e open-source</p>
        </div>
    </div>

    <script>
        function showMessage(text, type = 'info') {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message show ' + type;
            setTimeout(() => msg.classList.remove('show'), 5000);
        }

        function setLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
        }

        async function checkStatus() {
            const ip = document.getElementById('printerIp').value;
            if (!ip) {
                showMessage('Digite o IP da impressora', 'error');
                return;
            }

            setLoading(true);
            try {
                const response = await fetch('/api/status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ip })
                });

                const data = await response.json();
                setLoading(false);

                if (data.success) {
                    const container = document.getElementById('countersContainer');
                    container.innerHTML = `<strong>Modelo: ${data.model}</strong><br><br>`;
                    
                    for (const [key, value] of Object.entries(data.status)) {
                        const percentage = value.percentage;
                        const isCritical = percentage > 80;
                        const html = `
                            <div class="counter">
                                <div class="counter-name">${key}: ${percentage.toFixed(1)}%</div>
                                <div class="counter-bar">
                                    <div class="counter-fill ${isCritical ? 'critical' : ''}" style="width: ${percentage}%"></div>
                                </div>
                                <div class="counter-percentage">
                                    ${isCritical ? '⚠️ Precisa resetar!' : '✓ OK'}
                                </div>
                            </div>
                        `;
                        container.innerHTML += html;
                    }
                    
                    document.getElementById('statusCard').classList.add('show');
                    document.getElementById('btnReset').disabled = false;
                    showMessage('Status verificado!', 'success');
                } else {
                    showMessage('Erro: ' + data.error, 'error');
                    document.getElementById('btnReset').disabled = true;
                }
            } catch (error) {
                setLoading(false);
                showMessage('Erro: ' + error.message, 'error');
            }
        }

        async function resetPrinter() {
            if (!confirm('🚨 Resetar almofada? Isso não pode ser desfeito!')) return;

            const ip = document.getElementById('printerIp').value;
            setLoading(true);

            try {
                const response = await fetch('/api/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ip })
                });

                const data = await response.json();
                setLoading(false);

                if (data.success) {
                    showMessage('✅ ' + data.message, 'success');
                    const container = document.getElementById('countersContainer');
                    container.innerHTML = `<strong>Modelo: ${data.model}</strong><br><br>`;
                    
                    for (const [key, value] of Object.entries(data.status_after)) {
                        const html = `
                            <div class="counter">
                                <div class="counter-name">${key}: ${value.percentage.toFixed(1)}%</div>
                                <div class="counter-bar">
                                    <div class="counter-fill" style="width: ${value.percentage}%"></div>
                                </div>
                                <div class="counter-percentage">✓ OK</div>
                            </div>
                        `;
                        container.innerHTML += html;
                    }
                } else {
                    showMessage('Erro: ' + data.error, 'error');
                }
            } catch (error) {
                setLoading(false);
                showMessage('Erro: ' + error.message, 'error');
            }
        }
    </script>
</body>
</html>
